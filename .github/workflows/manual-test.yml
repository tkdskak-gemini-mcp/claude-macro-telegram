name: Manual Test - Telegram Send

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Test message (optional, default Hello World)"
        required: false
        default: "Hello from GitHub Actions!"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send test message to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/send_telegram.sh
          MSG="$(printf '✅ %s\n\n• Time (UTC): %s\n• Repo: %s\n• Run: #%s\n• Triggered by: %s' \
            "${{ inputs.message }}" \
            "$(date -u '+%Y-%m-%d %H:%M:%S')" \
            "$GITHUB_REPOSITORY" \
            "$GITHUB_RUN_NUMBER" \
            "$GITHUB_ACTOR")"
          ./scripts/send_telegram.sh "$MSG"
